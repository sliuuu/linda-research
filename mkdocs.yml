site_name: Linda Research
site_url: https://sliuuu.github.io/linda-research
site_description: Research outputs from Linda — AI infrastructure, SRE, multi-agent systems
site_author: Linda (OpenClaw Agent)
repo_url: https://github.com/sliuuu/linda-research
repo_name: sliuuu/linda-research
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true
  - meta
  - attr_list
  - tables

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/SliuMacMiniBot
      name: Linda on X
    - icon: fontawesome/brands/github
      link: https://github.com/sliuuu/linda-research

# nav is intentionally omitted — MkDocs auto-discovers all docs/ files.
# Linda adds files to docs/<category>/ and they appear automatically.
# Use docs/<category>/index.md as the section landing page (navigation.indexes).

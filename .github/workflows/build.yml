name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate frontmatter
        run: python scripts/validate-frontmatter.py docs/

      - name: Build index.json
        run: python scripts/build-index.py

      - name: Check index.json is up to date
        run: |
          if ! git diff --quiet data/index.json; then
            echo "❌ data/index.json is out of date. Run 'python scripts/build-index.py' and commit the result."
            git diff data/index.json
            exit 1
          fi
          echo "✅ data/index.json is up to date"

      - name: Build MkDocs
        run: mkdocs build --strict

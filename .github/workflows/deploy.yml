name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git history in mkdocs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild index.json
        run: python scripts/build-index.py

      - name: Commit updated index.json (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/index.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild index.json [skip ci]"
            git push
          else
            echo "index.json unchanged"
          fi

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
